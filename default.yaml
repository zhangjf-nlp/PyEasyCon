capture:
  width: 1920
  height: 1080
  fps: 60
  device_id: 0
  backend: dshow
  retry_attempts: 3
  flip_vertical: false
  flip_horizontal: false
record:
  width: 640
  height: 360
  fps: 30
  max_frames: 54000
serial:
  baudrate: 115200
  timeout: 2.0
  minimal_interval_ms: 30
gui:
  window_width: 1030
  window_height: 790
  font_family: microsoft YaHei
  font_size: 14
  font_size_small: 12
  font_mono: simsun
  font_mono_size: 13
vision:
  gba:
    native_width: 240
    native_height: 160
    sprite_native: 64
    search_x: 144
    search_y_min: 0
    search_y_max: 100
    sprite_roi_x: 140
    sprite_roi_w: 72
    sprite_roi_h: 100
  elevated:
    level_rect: [360, 876, 138, 124]
    stat_rects:
      - [1545, 48, 152, 97]     # HP
      - [1545, 148, 152, 97]    # Attack
      - [1545, 248, 152, 97]    # Defense
      - [1545, 348, 152, 97]    # Sp.Atk
      - [1545, 448, 152, 97]    # Sp.Def
      - [1545, 548, 152, 97]    # Speed
  caught_info:
    level_rect: [262, 124, 108, 85]
    gender_rect: [847, 124, 68, 81]
    nature_rect: [222, 746, 741, 97]
  caught_iv:
    level_rect: [262, 124, 108, 85]
    ability_rect: [635, 853, 529, 78]
    stat_hp_rect: [1439, 140, 288, 72]
    stat_other_rects:
      - [1439, 240, 288, 72]    # Attack
      - [1439, 340, 288, 72]    # Defense
      - [1439, 440, 288, 72]    # Sp.Atk
      - [1439, 540, 288, 72]    # Sp.Def
      - [1439, 640, 288, 72]    # Speed
  name_roi: [300, 135, 400, 55]
  screen_classifier:
    elevated_h_ratio: 0.15
    caught_info_h_ratio: 0.1
    caught_iv_h_ratio: 0.1
vl_model:
  type: vllm
  vllm:
    base_url: http://localhost:8000/v1
    api_key: sk-PyEasyCon
    model_name: Qwen3-VL-2B-Instruct-FP8
  ollama:
    base_url: http://localhost:8008/v1
    api_key: sk-PyEasyCon
    model_name: modelscope.cn/Qwen/Qwen3-VL-2B-Instruct-GGUF:latest
  siliconflow:
    base_url: https://api.siliconflow.cn/v1
    api_key: sk-xxxxx
    model: Qwen/Qwen3-VL-8B-Instruct
    max_retries: 3
labels:
  dir: assets/labels
  sprite_labels_dir: assets/sprite_labels
sprites:
  normal_dir: assets/sprites/normal
  shiny_dir: assets/sprites/shiny
  resources_dir: assets/sprites/resources
rng:
  resources_dir: modules/tenlines/resources
  personal_bin: Personal/Gen3/personal_rsefrlg.bin
  species_file: i18n/en/species_en.txt
  abilities_file: i18n/en/abilities_en.txt
  encounters_dir: EncounterTables/Gen3/frlg
  seed_data: fr_eng_nx.bin
  calibration:
    seed_ms_min: 33000
    seed_ms_max: 72000
    tv_ms_min: 3000
    normal_ms_min: 10000
key_mapping:
  default:
    y: A
    u: B
    i: X
    h: Y
    g: L
    t: R
    f: ZL
    r: ZR
    k: PLUS
    j: MINUS
    z: CAPTURE
    c: HOME
    q: LCLICK
    e: RCLICK
    w: UP
    s: DOWN
    a: LEFT
    d: RIGHT
  custom: {}
