capture:
  width: 1920
  height: 1080
  fps: 60
  device_id: 0
  backend: dshow
  retry_attempts: 3
  flip_vertical: false
  flip_horizontal: false
record:
  width: 640
  height: 360
  fps: 30
  max_frames: 54000
serial:
  baudrate: 115200
  timeout: 2.0
  minimal_interval_ms: 30
gui:
  window_width: 1030
  window_height: 790
  font_family: microsoft YaHei
  font_size: 14
  font_size_small: 12
  font_mono: simsun
  font_mono_size: 13
vl_model:
  type: vllm
  vllm:
    base_url: http://localhost:8000/v1
    api_key: sk-PyEasyCon
    model_name: Qwen3-VL-2B-Instruct-FP8
  ollama:
    base_url: http://localhost:8008/v1
    api_key: sk-PyEasyCon
    model_name: modelscope.cn/Qwen/Qwen3-VL-2B-Instruct-GGUF:latest
  siliconflow:
    base_url: https://api.siliconflow.cn/v1
    api_key: sk-xxxxx
    model: Qwen/Qwen3-VL-8B-Instruct
    max_retries: 3
labels:
  dir: assets/labels
  sprite_labels_dir: assets/sprite_labels
sprites:
  normal_dir: assets/sprites/normal
  shiny_dir: assets/sprites/shiny
  resources_dir: assets/sprites/resources
rng:
  resources_dir: modules/tenlines/resources
  personal_bin: Personal/Gen3/personal_rsefrlg.bin
  species_file: i18n/en/species_en.txt
  abilities_file: i18n/en/abilities_en.txt
  encounters_dir: EncounterTables/Gen3/frlg
  seed_data: fr_eng_nx.bin
  calibration:
    seed_ms_min: 33000
    seed_ms_max: 72000
    tv_ms_min: 3000
    normal_ms_min: 10000
key_mapping:
  default:
    y: A
    u: B
    i: X
    h: Y
    g: L
    t: R
    f: ZL
    r: ZR
    k: PLUS
    j: MINUS
    z: CAPTURE
    c: HOME
    q: LCLICK
    e: RCLICK
    w: UP
    s: DOWN
    a: LEFT
    d: RIGHT
  custom: {}
